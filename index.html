    <script type="module">
      // ---- THREE.JS SETUP ----
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import {
        CSS2DRenderer,
        CSS2DObject,
      } from "three/addons/renderers/CSS2DRenderer.js";

      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x02111e, 0.0035);

      // Responsive camera
      let camera;
      function initCamera() {
        const aspect = window.innerWidth / window.innerHeight;
        const fov = window.innerWidth < 768 ? 50 : 40;
        camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 200);
        const dist =
          window.innerWidth < 480 ? 38 : window.innerWidth < 768 ? 32 : 28;
        camera.position.set(22, 14, dist);
        camera.lookAt(0, 0, 0);
      }
      initCamera();

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      container.appendChild(renderer.domElement);

      const labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.domElement.style.position = "absolute";
      labelRenderer.domElement.style.top = "0";
      labelRenderer.domElement.style.left = "0";
      labelRenderer.domElement.style.pointerEvents = "none";
      container.appendChild(labelRenderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.25;
      controls.maxPolarAngle = Math.PI / 2.2;
      controls.minDistance = 8;
      controls.maxDistance = 55;
      controls.target.set(0, 0, 0);
      controls.touchRotate = true;
      controls.touchZoom = true;

      // Lights
      const ambient = new THREE.AmbientLight(0x1a4a6a, 0.7);
      scene.add(ambient);
      const sun = new THREE.DirectionalLight(0xaae0ff, 1.0);
      sun.position.set(20, 30, 10);
      sun.castShadow = true;
      scene.add(sun);
      const fill = new THREE.DirectionalLight(0x4a8caa, 0.5);
      fill.position.set(-20, 10, -20);
      scene.add(fill);

      // Particles
      const pGeo = new THREE.BufferGeometry();
      const pCount = 3500;
      const pPos = new Float32Array(pCount * 3);
      for (let i = 0; i < pCount * 3; i += 3) {
        pPos[i] = (Math.random() - 0.5) * 140;
        pPos[i + 1] = (Math.random() - 0.5) * 50 + 2;
        pPos[i + 2] = (Math.random() - 0.5) * 100;
      }
      pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
      const pMat = new THREE.PointsMaterial({
        color: 0x8ad4ff,
        size: 0.15,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
      });
      scene.add(new THREE.Points(pGeo, pMat));

      // Bubbles
      const bubbleGroup = new THREE.Group();
      const bGeo = new THREE.SphereGeometry(0.2, 6, 6);
      const bMat = new THREE.MeshPhysicalMaterial({
        color: 0xc0f0ff,
        transparent: true,
        opacity: 0.15,
        roughness: 0.1,
      });
      const bubbleCount = window.innerWidth < 480 ? 80 : 150;
      for (let i = 0; i < bubbleCount; i++) {
        const b = new THREE.Mesh(bGeo, bMat);
        b.position.set(
          (Math.random() - 0.5) * 80,
          (Math.random() - 0.5) * 35,
          (Math.random() - 0.5) * 60,
        );
        b.scale.setScalar(0.4 + Math.random() * 1.8);
        b.userData = { speed: 0.004 + Math.random() * 0.02 };
        bubbleGroup.add(b);
      }
      scene.add(bubbleGroup);

      // Jellyfish
      function createJellyfish(x, y, z) {
        const g = new THREE.Group();
        const dome = new THREE.Mesh(
          new THREE.SphereGeometry(0.7, 8, 8),
          new THREE.MeshPhysicalMaterial({
            color: 0x88ddff,
            transparent: true,
            opacity: 0.3,
            emissive: 0x226688,
            emissiveIntensity: 0.2,
          }),
        );
        dome.scale.set(1, 0.5, 1);
        g.add(dome);
        for (let i = 0; i < 10; i++) {
          const tent = new THREE.Mesh(
            new THREE.CylinderGeometry(
              0.02,
              0.05,
              1.0 + Math.random() * 0.8,
              3,
            ),
            new THREE.MeshPhysicalMaterial({
              color: 0x88ddff,
              transparent: true,
              opacity: 0.2,
            }),
          );
          tent.position.set(
            Math.sin((i / 10) * Math.PI * 2) * 0.6,
            -0.5,
            Math.cos((i / 10) * Math.PI * 2) * 0.6,
          );
          tent.rotation.z = Math.sin((i / 10) * Math.PI * 2) * 0.3;
          tent.rotation.x = Math.cos((i / 10) * Math.PI * 2) * 0.3;
          g.add(tent);
        }
        g.position.set(x, y, z);
        return g;
      }
      const jellyCount = window.innerWidth < 480 ? 5 : 10;
      for (let i = 0; i < jellyCount; i++) {
        scene.add(
          createJellyfish(
            (Math.random() - 0.5) * 50,
            (Math.random() - 0.5) * 14 + 2,
            (Math.random() - 0.5) * 40,
          ),
        );
      }

            <li><span class="highlight">Hands should be visible</span></li>
          </ul><br>

          <div class="section">Bread Etiquette</div>
          <div class="key-point">🍞 Wait for the Right Moment, Take the Bread Plate, Break, Don't Bite.</div>

          <br>
          <div class="section">Soup Types</div>
          <div class="diagram-box">Bisque · Consomme · Chowder · Broth/Stock · Gazpacho</div>
          
          <br>
          <div class="section">Finished Eating</div>
          <div class="key-point">Place your knife and fork parallel at the <span class="highlight">4:20 or 6:30 position</span>. Napkins loosely to the left of the plate.</div>
          
          <br>
          <div class="section">Do's and Don'ts</div>
          <ul>
            <li><strong>Do's:</strong> Arrive on time, Silence your phone, Place your napkin on your lap, Keep your elbows off the table, Use utensils from the outside in, Say "please" and "thank you"</li>
            <li><strong>Don'ts:</strong> Cleaning your teeth, Blowing a wind, Grooming yourself, Applying make up.</li>
          </ul>

          <div class="reflection">
            <strong>Reflection:</strong> I grew up eating casually sometimes with my phone next to my plate, sometimes with my elbow on the table. Nobody taught me that cutlery can speak. This lecture felt like entering a secret society. There are rules, yes but they are not meant to make me feel small. They are meant to make others feel respected. <span class="highlight">"Manners are not about being fancy. They are about being thoughtful even when no one is watching."</span>
          </div>
        `,
        },
        {
          title: "💼 Professional Presence",
          meta: "Ms. Maneesha Gunawardena · 07.05.2026",
          content: `
          <div class="section">Professional Presence</div>
          When I heard "Professional Presence", I assumed it would be basic tuck in your shirt, smile more. Something I could coast through. But I was wrong.

          <div class="diagram-box">
            <span class="highlight">55%</span> HOW YOU LOOK · <span class="highlight">38%</span> HOW YOU SOUND · <span class="highlight">7%</span> WHAT YOU SAY
          </div>
          <div class="key-point">⚠️ Only 7% is the actual words. The impression is already formed before you open your mouth.</div>
          <br>
          <div class="section">Dressing Rules</div>
          <ul>
            <li>Trousers should sit at the ankle not shorter, not dragging.</li>
            <li>Tops should never show the midriff.</li>
            <li><span class="highlight">Belt must match your shoes.</span></li>
            <li>Bags should be neutral and formal.</li>
            <li>Jewellery should be minimal.</li>
            <li>If shoes have laces, there must be socks.</li>
          </ul>

          <div class="section">Hair</div>
          <div class="key-point">💇 Keep it neat. Keep it simple. Hair ties and clips should match your hair colour not your outfit.</div>
        <br>
          <div class="section">Hands & Nails</div>
          <div class="key-point">✋ Clean. Nails at an even length. Nothing dramatic. Just maintained.</div>
        <br>
          <div class="section">Body Language</div>
          <ul>
            <li><strong>Facial Expressions:</strong> Be aware of what your face is saying.</li>
            <li><strong>Posture:</strong> Sitting straight and leaning forward shows interest.</li>
            <li><strong>Handshake:</strong> Firm, confident and short.</li>
          </ul>

          <div class="reflection">
            <strong>Reflection:</strong> Before this, I genuinely believed professional Presence was a "business and management" thing. As an IT student, I thought my technical skills were what would carry me. How I looked and carried myself felt secondary. The 55% stat changed that thinking directly. <span class="highlight">"More than half of how someone perceives you have nothing to do with what you actually say."</span> Professional Presence is about being confident and showing your true self with purpose.
          </div><br>
        `,
        },
      ];

      // ---- BUILD DISTRICTS (clickable) ----
      const clickables = [];
      const colors = [
        0x1a7a9a, 0x2a9aba, 0x3abada, 0x4acada, 0x5adada, 0x6aeafa, 0x7afafa,
        0x8afaff, 0x9afaff, 0xaafaff,
      ];

      // Responsive district size
      const isMobile = window.innerWidth < 768;
      const radius = isMobile ? 12 : 15;
      const coreScale = isMobile ? 0.7 : 0.9;

      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius;

        const group = new THREE.Group();
        group.position.set(x, 0.5 + Math.sin(i * 1.5) * 0.6, z);

        const plat = new THREE.Mesh(
          new THREE.CylinderGeometry(
            isMobile ? 1.2 : 1.6,
            isMobile ? 1.5 : 2.0,
            0.4,
            16,
          ),
          new THREE.MeshPhysicalMaterial({
            color: 0x1a4a6a,
            roughness: 0.4,
            metalness: 0.2,
            emissive: 0x0a2a3a,
            emissiveIntensity: 0.2,
          }),
        );
        plat.position.y = -0.2;
        plat.receiveShadow = true;
        group.add(plat);

        const core = new THREE.Mesh(
          new THREE.OctahedronGeometry(coreScale, 1),
          new THREE.MeshPhysicalMaterial({
            color: colors[i % colors.length],
            emissive: colors[i % colors.length],
            emissiveIntensity: 0.25,
            transparent: true,
            opacity: 0.8,
            roughness: 0.2,
            metalness: 0.1,
          }),
        );
        core.position.y = 0.7;
        core.castShadow = true;
        core.userData = { index: i };
        group.add(core);
        clickables.push(core);

        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(isMobile ? 0.9 : 1.2, 0.04, 8, 20),
          new THREE.MeshPhysicalMaterial({
            color: 0x88ddff,
            emissive: 0x226688,
            emissiveIntensity: 0.3,
          }),
        );
        ring.position.y = 1.1;
        ring.rotation.x = Math.PI / 3;
        group.add(ring);

        // Label - responsive font size
        const labelSize = isMobile ? "9px" : "11px";
        const div = document.createElement("div");
        const shortName = lessonData[i].title.split("·")[0].trim();
        div.textContent = isMobile
          ? shortName.replace(/[^\w\s]/g, "").trim()
          : shortName;
        div.style.color = "#d4f4ff";
        div.style.fontSize = labelSize;
        div.style.fontWeight = "300";
        div.style.background = "rgba(2,17,30,0.6)";
        div.style.backdropFilter = "blur(4px)";
        div.style.padding = isMobile ? "2px 8px" : "3px 14px";
        div.style.borderRadius = "30px";
        div.style.border = "1px solid #3ad8ff55";
        div.style.letterSpacing = "1px";
        div.style.whiteSpace = "nowrap";
        div.style.pointerEvents = "none";
        div.style.fontSize = isMobile ? "8px" : "11px";
        const label = new CSS2DObject(div);
        label.position.set(0, isMobile ? 1.6 : 2.0, 0);
        group.add(label);

        scene.add(group);
      }

      // ---- RAYCASTER CLICK ----
      const panel = document.getElementById("lesson-panel");
      const panelTitle = document.getElementById("panel-title");
      const panelMeta = document.getElementById("panel-meta");
      const panelContent = document.getElementById("panel-content");
      const closeBtn = document.getElementById("close-panel");

      function showLesson(index) {
        const data = lessonData[index];
        if (!data) return;
        panelTitle.textContent = data.title;
        panelMeta.textContent = data.meta;
        panelContent.innerHTML = data.content;
        panel.style.display = "block";
        controls.autoRotate = false;
        // Scroll to top
        panel.scrollTop = 0;
      }

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      // Handle both click and touch
      function handleInteraction(event) {
        let clientX, clientY;
        if (event.touches) {
          clientX = event.touches[0].clientX;
          clientY = event.touches[0].clientY;
          event.preventDefault();
        } else {
          clientX = event.clientX;
          clientY = event.clientY;
        }
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(clickables);
        if (intersects.length > 0) {
          const idx = intersects[0].object.userData.index;
          if (idx !== undefined) showLesson(idx);
        }
      }

      renderer.domElement.addEventListener("click", handleInteraction);
      renderer.domElement.addEventListener("touchstart", handleInteraction, {
        passive: false,
      });

      closeBtn.addEventListener("click", () => {
        panel.style.display = "none";
        controls.autoRotate = true;
      });
      closeBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        panel.style.display = "none";
        controls.autoRotate = true;
      });

      // ---- RESIZE HANDLER ----
      function onResize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
        labelRenderer.setSize(width, height);

        // Update camera distance based on screen size
        const dist = width < 480 ? 38 : width < 768 ? 32 : 28;
        camera.position.set(22, 14, dist);
        controls.update();
      }

      window.addEventListener("resize", onResize);

      // ---- ANIMATION ----
      let clock = new THREE.Clock();
      function animate() {
        const t = clock.getElapsedTime();
        bubbleGroup.children.forEach((b, idx) => {
          b.position.y += Math.sin(t * 0.4 + idx) * 0.0015;
          b.position.x += Math.sin(t * 0.3 + idx * 0.7) * 0.0008;
          b.position.z += Math.cos(t * 0.4 + idx * 0.5) * 0.0008;
        });
        clickables.forEach((c) => {
          c.rotation.x += 0.008;
          c.rotation.z += 0.006;
        });
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();
    </script>
  </body>
</html>
